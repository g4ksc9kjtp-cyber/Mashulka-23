<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>💖 Порадуй Машульку</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Nunito',sans-serif;
background:
linear-gradient(135deg,#ffe5ef,#f1dcff,#e0ffe6);
overflow-x:hidden;
color:#444;
}

/* фоновые цветочки */

.flowers{
position:fixed;
inset:0;
pointer-events:none;
overflow:hidden;
z-index:0;
}

.flower{
position:absolute;
font-size:30px;
opacity:.18;
animation:float 16s linear infinite;
}

@keyframes float{
from{
transform:translateY(110vh) rotate(0deg);
}
to{
transform:translateY(-120px) rotate(360deg);
}
}

.container{
position:relative;
z-index:2;
max-width:1250px;
margin:auto;
padding:40px 20px 80px;
}

.hero{
text-align:center;
margin-bottom:50px;
animation:fade 1s ease;
}

.hero h1{
font-size:64px;
color:#ff4fa3;
margin-bottom:12px;
text-shadow:0 6px 20px rgba(255,79,163,.25);
}

.hero p{
font-size:20px;
color:#8e6bff;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(290px,1fr));
gap:24px;
}

.card{
position:relative;
background:rgba(255,255,255,.78);
backdrop-filter:blur(14px);
border-radius:32px;
padding:24px;
overflow:hidden;

box-shadow:
0 10px 30px rgba(0,0,0,.08),
inset 0 0 0 1px rgba(255,255,255,.7);

transition:.35s;
animation:show .7s ease;
}

.card:hover{
transform:translateY(-10px) scale(1.02);
}

@keyframes show{
from{
opacity:0;
transform:translateY(30px) scale(.95);
}
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

.card::before{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(circle at top right,
rgba(255,255,255,.9),
transparent 40%);
pointer-events:none;
}

.badge{
position:absolute;
top:14px;
right:16px;
font-size:28px;
}

.title{
font-size:22px;
font-weight:900;
line-height:1.3;
margin-bottom:18px;
padding-right:40px;
}

.buttons{
display:flex;
flex-wrap:wrap;
gap:12px;
}

.btn{
border:none;
border-radius:16px;
padding:13px 18px;
font-size:14px;
font-weight:800;
cursor:pointer;
transition:.25s;
}

.btn:hover{
transform:scale(1.05);
}

.open-btn{
background:linear-gradient(135deg,#ff9ecf,#c084fc);
color:white;
}

.reserve-btn{
background:#22c55e;
color:white;
}

.reserved{
opacity:.55;
}

.reserved .title{
text-decoration:line-through;
}

.reserved-note{
margin-top:16px;
display:inline-block;
background:#22c55e;
padding:10px 14px;
border-radius:999px;
color:white;
font-size:13px;
font-weight:800;
}

.footer{
margin-top:70px;
text-align:center;
font-size:15px;
color:#9d8cff;
}

/* конфетти */

.confetti{
position:fixed;
width:10px;
height:10px;
border-radius:50%;
pointer-events:none;
animation:fall 2s linear forwards;
z-index:9999;
}

@keyframes fall{
to{
transform:
translateY(100vh)
rotate(720deg);
opacity:0;
}
}

</style>
</head>
<body>

<div class="flowers"></div>

<div class="container">

<div class="hero">
<h1>💖 Порадуй Машульку</h1>
<p>
милый wishlist в стиле pinterest 🌸
</p>
</div>

<div class="grid" id="wishlist"></div>

<div class="footer">
сделано с любовью ✨
</div>

</div>

<script>

const items = [

{
title:"Ozon подарок 1",
url:"https://ozon.ru/t/hoMFXFt"
},

{
title:"Ozon подарок 2",
url:"https://ozon.ru/t/tKg1h4s"
},

{
title:"Тренажер реформер для похудения и фитнеса доска для пилатеса",
url:"https://www.wildberries.ru/catalog/461381491/detail.aspx?size=649380174"
},

{
title:"Frudia Увлажняющий крем гель для лица с черникой",
url:"https://www.wildberries.ru/catalog/4728695/detail.aspx?size=17458763"
},

{
title:"DHANA Cумка через плечо кросс-боди",
url:"https://www.wildberries.ru/catalog/437368515/detail.aspx?size=620324431"
},

{
title:"ANDA Набор косметичек 3 в 1 для бассейна и путешествия",
url:"https://www.wildberries.ru/catalog/540941374/detail.aspx?size=744928268"
},

{
title:"The Act Скраб для тела антицеллюлитный. Подарочный набор 3 шт",
url:"https://www.wildberries.ru/catalog/18165016/detail.aspx?size=49612285"
},

{
title:"The Act Набор для очищения лица масло и гель для умывания",
url:"https://www.wildberries.ru/catalog/441004027/detail.aspx?size=624634492"
},

{
title:"LIBREDERM Гиалуроновая вода спрей для лица, увлажняющая 120 мл",
url:"https://www.wildberries.ru/catalog/35433151/detail.aspx?size=74259377"
},

{
title:"LIBREDERM Увлажняющая термальная вода для лица и тела 125 мл",
url:"https://www.wildberries.ru/catalog/42085435/detail.aspx?size=84349774"
},

{
title:"Case by case Чехол для наушников AirPods 1 и 2",
url:"https://www.wildberries.ru/catalog/168695511/detail.aspx?size=280375876"
},

{
title:"STIMAXON Степпер тренажер для ног и ягодиц с эспандерами для дома",
url:"https://www.wildberries.ru/catalog/663237871/detail.aspx?size=891628244"
},

{
title:"Case by case Чехол для наушников AirPods 1 и 2",
url:"https://www.wildberries.ru/catalog/347690859/detail.aspx?size=515473117"
},

{
title:"О'кейси Чехол на airpods",
url:"https://www.wildberries.ru/catalog/374150254/detail.aspx?size=545919016"
},

{
title:"ОТКРУС Полотенце банное махровое набор 3 шт",
url:"https://www.wildberries.ru/catalog/721180244/detail.aspx?size=1015106787"
},

{
title:"The Act Масло твердое для тела с ароматом винограда 180 г",
url:"https://www.wildberries.ru/catalog/219651873/detail.aspx?size=349394222"
},

{
title:"ЯРКО и DES Кофейный напиток 3 в 1 в пакетиках растворимый 21 шт по 30 г",
url:"https://www.wildberries.ru/catalog/587590128/detail.aspx?size=802756593"
}

];

const root =
document.getElementById("wishlist");

let reserved =
JSON.parse(
localStorage.getItem("mashulkaReserve")
) || {};

function render(){

root.innerHTML="";

items.forEach((item,index)=>{

const card=document.createElement("div");

card.className=
`card ${reserved[index] ? "reserved" : ""}`;

card.innerHTML=`

<div class="badge">🌸</div>

<div class="title">
${item.title}
</div>

<div class="buttons">

<button
class="btn open-btn"
onclick="window.open('${item.url}','_blank')">

Открыть подарок 💖

</button>

<button
class="btn reserve-btn"
onclick="toggleReserve(${index})">

${reserved[index]
? "Подарок занят 🎀"
: "Я подарю 🎁"}

</button>

</div>

${reserved[index]
? `
<div class="reserved-note">
🙋 Кто-то уже подарит это
</div>
`
: ""}

`;

root.appendChild(card);

});

}

function toggleReserve(index){

reserved[index]=!reserved[index];

localStorage.setItem(
"mashulkaReserve",
JSON.stringify(reserved)
);

confetti();

render();

}

function confetti(){

for(let i=0;i<40;i++){

const c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.top="-10px";

c.style.background=
`hsl(${Math.random()*360},90%,75%)`;

c.style.transform=
`scale(${Math.random()*1.5+.5})`;

document.body.appendChild(c);

setTimeout(()=>{
c.remove();
},2000);

}

}

/* цветочки */

const flowers=
document.querySelector(".flowers");

const arr=["🌸","🌷","🌼","💮","🌺"];

for(let i=0;i<28;i++){

const fl=document.createElement("div");

fl.className="flower";

fl.innerHTML=
arr[Math.floor(Math.random()*arr.length)];

fl.style.left=
Math.random()*100+"vw";

fl.style.animationDuration=
(10+Math.random()*12)+"s";

fl.style.fontSize=
(20+Math.random()*26)+"px";

flowers.appendChild(fl);

}

render();

</script>

</body>
</html>
